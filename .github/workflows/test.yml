name: test

on:
  # Every push onto the main branch triggers a retest.
  push:
    branches:
      - master
      - testing
  # All pull_requests trigger a retest.
  pull_request:
  workflow_dispatch:

jobs:

  mac:
    strategy:
      fail-fast: false
      matrix:
        libvvp: [true]
        suffix: [true]
    runs-on: macos-15-intel
    name: 🍏 macOS${{ matrix.libvvp && ' +libvvp' || '' }}${{ matrix.suffix && ' +suffix' || '' }}
    steps:

    - uses: actions/checkout@v6

    - name: Install dependencies
      run: |
        brew install bison
        brew install librdkafka
        brew install docker
        brew install colima
        colima start
        timeout 60 bash -c 'until docker info 2>/dev/null; do sleep 2; done'
    - name: Start Kafka
      run: |
        docker pull apache/kafka:4.3.0
        docker run -d --name kafka \
          -p 9092:9092 \
          -e KAFKA_CFG_NODE_ID=0 \
          -e KAFKA_CFG_PROCESS_ROLES=controller,broker \
          -e KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093 \
          -e KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092 \
          -e KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT \
          -e KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@localhost:9093 \
          -e KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER \
          -e KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true \
          apache/kafka:4.3.0
        # Wait for broker to be ready
        sleep 15
        docker exec kafka /opt/kafka/bin/kafka-topics.sh --create \
          --topic iv_data_stream \
          --bootstrap-server localhost:9092 \
          --partitions 1 \
          --replication-factor 1
    
    - name: Set up Python environment
      run: |
        python3 -m venv .venv
        . .venv/bin/activate
        pip install --upgrade pip
        pip install kafka-python

    - name: Build, check and install
      run: |
        export PATH="/usr/local/opt/bison/bin:$PATH"
        CONFIG_OPTS="--enable-libveriuser"
        if [ "${{ matrix.libvvp }}" = "true" ]; then
            CONFIG_OPTS="$CONFIG_OPTS --enable-libvvp"
        fi
        if [ "${{ matrix.suffix }}" = "true" ]; then
            CONFIG_OPTS="$CONFIG_OPTS --enable-suffix"
        fi
        autoconf
        ./configure $CONFIG_OPTS
        make -j$(nproc) check
        sudo make install

    - name: Test
      run: |
        . .venv/bin/activate
        make check-installed


  lin:
    services:
        kafka:
          image: apache/kafka:4.3.0
          ports:
            - 9092:9092
          env:
            KAFKA_CFG_NODE_ID: 0
            KAFKA_CFG_PROCESS_ROLES: controller,broker
            KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
            KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
            KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
            KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
            KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
            KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    strategy:
      fail-fast: false
      matrix:
        os: ['22.04', '24.04']
        # libvvp: [false, true]
        # suffix: [false, true]
    runs-on: ubuntu-${{ matrix.os }}
    name: 🐧 Ubuntu ${{ matrix.os }}${{ matrix.libvvp && ' +libvvp' || '' }}${{ matrix.suffix && ' +suffix' || '' }}
    steps:

    - uses: actions/checkout@v6

    - name: Install dependencies
      run: |
        sudo apt update -qq
        sudo apt install -y make g++ git bison flex gperf libreadline-dev libbz2-dev autoconf python3-venv
        python3 -m venv .venv
        . .venv/bin/activate
        pip install --upgrade pip
        pip install -r Documentation/requirements.txt
        pip install kafka-python
        sudo apt install librdkafka-dev

    - name: Build, check and install
      run: |
        CONFIG_OPTS="--enable-libveriuser"
        if [ "${{ matrix.libvvp }}" = "true" ]; then
            CONFIG_OPTS="$CONFIG_OPTS --enable-libvvp"
        fi
        if [ "${{ matrix.suffix }}" = "true" ]; then
            CONFIG_OPTS="$CONFIG_OPTS --enable-suffix"
        fi
        autoconf
        ./configure $CONFIG_OPTS
        make -j$(nproc) check
        sudo make install
    - name: Create Kafka topic
      run: |
        curl -sL --retry 3 https://archive.apache.org/dist/kafka/4.3.0/kafka_2.13-4.3.0.tgz | tar -xz
        timeout 60 bash -c 'until kafka_2.13-4.3.0/bin/kafka-topics.sh --list --bootstrap-server localhost:9092 2>/dev/null; do sleep 2; done'
        kafka_2.13-4.3.0/bin/kafka-topics.sh --create \
          --topic iv_data_stream \
          --bootstrap-server localhost:9092 \
          --partitions 1 \
          --replication-factor 1
    - name: Test
      run:
        . .venv/bin/activate
        make check-installed

    - name: Documentation
      run: |
        . .venv/bin/activate
        cd Documentation
        make html

  win:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        msystem: [MINGW64, UCRT64, CLANG64]
        # libvvp: [false, true]
        # suffix: [false, true]
        include:
          - { msystem: MINGW64, env: x86_64 }
          - { msystem: UCRT64,  env: ucrt-x86_64 }
          - { msystem: CLANG64, env: clang-x86_64 }
    name: 🟪 ${{ matrix.msystem }}${{ matrix.libvvp && ' +libvvp' || '' }}${{ matrix.suffix && ' +suffix' || '' }}
    defaults:
      run:
        shell: msys2 {0}
    env:
      MINGW_ARCH: ${{ matrix.msystem }}
    steps:

    - run: git config --global core.autocrlf input
      shell: bash

    - uses: actions/checkout@v6

    - uses: msys2/setup-msys2@v2
      with:
        msystem: ${{ matrix.msystem }}
        update: true
        install: >
          git
          base-devel
          python-pip
          mingw-w64-${{ matrix.env }}-perl
          mingw-w64-${{ matrix.env }}-librdkafka

    - uses: actions/setup-python@v6
      with:
        python-version: '>=3.5'
        
    - name: Set up Python environment
      run: |
        python -m venv .venv
        . .venv/bin/activate
        pip install --upgrade pip
        pip install kafka-python
    - name: Start Docker daemon
      shell: pwsh
      run: |
        $cli = Get-ChildItem "C:\Program Files\Docker" -Recurse -Filter "DockerCli.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
        if ($cli) {
          Write-Host "Found DockerCli at $($cli.FullName)"
          & $cli.FullName -SwitchLinuxEngine
          Start-Sleep -Seconds 15
        } else {
          Write-Host "DockerCli.exe not found, trying Start-Service"
          Start-Service docker -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 15
        }
        Start-Service docker

    - name: Start Kafka
      run: |
        export PATH=$PATH:/c/Program\ Files/Docker/Docker/resources/bin
        docker pull apache/kafka:4.3.0
        docker run -d --name kafka \
          -p 9092:9092 \
          -e KAFKA_CFG_NODE_ID=0 \
          -e KAFKA_CFG_PROCESS_ROLES=controller,broker \
          -e KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093 \
          -e KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092 \
          -e KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT \
          -e KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@localhost:9093 \
          -e KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER \
          -e KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true \
          apache/kafka:4.3.0
        sleep 15
        docker exec kafka /opt/kafka/bin/kafka-topics.sh --create \
          --topic iv_data_stream \
          --bootstrap-server localhost:9092 \
          --partitions 1 \
          --replication-factor 1

    - name: Build and check
      run: |
        cd msys2
        CONFIG_OPTS=""
        if [ ${{ matrix.msystem }} != "CLANG64" ] ; then
            CONFIG_OPTS="$CONFIG_OPTS --enable-libveriuser"
        fi
        if [ "${{ matrix.libvvp }}" = "true" ] ; then
            CONFIG_OPTS="$CONFIG_OPTS --enable-libvvp"
        fi
        if [ "${{ matrix.suffix }}" = "true" ]; then
            CONFIG_OPTS="$CONFIG_OPTS --enable-suffix"
        fi
        export IVL_CONFIG_OPTIONS="$CONFIG_OPTS"
        makepkg-mingw --noconfirm --noprogressbar -sCLf

    - name: Install
      run: pacman -U --noconfirm msys2/*.zst

    - name: Test
      run: |
        . .venv/bin/activate
        make check-installed

    - uses: actions/upload-artifact@v7
      with:
        name: 🟪 ${{ matrix.msystem }}${{ matrix.libvvp && ' +libvvp' || '' }}
        path: msys2/*.zst
