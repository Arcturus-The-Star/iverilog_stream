name: test

on:
  # Every push onto the main branch triggers a retest.
  push:
    branches:
      - master
      - testing
  # All pull_requests trigger a retest.
  pull_request:
  workflow_dispatch:

jobs:

  mac:
    strategy:
      fail-fast: false
      matrix:
        libvvp: [true]
        suffix: [true]
    runs-on: macos-15-intel
    name: 🍏 macOS${{ matrix.libvvp && ' +libvvp' || '' }}${{ matrix.suffix && ' +suffix' || '' }}
    steps:

    - uses: actions/checkout@v6

    - name: Install dependencies
      run: |
        brew install bison
        brew install librdkafka
    - name: Start Kafka
      run: |
        brew install kafka
        BREW_PREFIX=$(brew --prefix)
        # Copy the kraft server.properties into place
        cp $BREW_PREFIX/etc/kafka/kraft/server.properties $BREW_PREFIX/etc/kafka/server.properties
        KAFKA_CLUSTER_ID=$(kafka-storage random-uuid)
        kafka-storage format -t $KAFKA_CLUSTER_ID -c $BREW_PREFIX/etc/kafka/server.properties
        kafka-server-start $BREW_PREFIX/etc/kafka/server.properties &
        timeout 60 bash -c 'until kafka-topics --list --bootstrap-server localhost:9092 2>/dev/null; do sleep 3; done'
        kafka-topics --create \
          --topic iv_data_stream \
          --bootstrap-server localhost:9092 \
          --partitions 1 \
          --replication-factor 1
    
    - name: Set up Python environment
      run: |
        python3 -m venv .venv
        . .venv/bin/activate
        pip install --upgrade pip
        pip install kafka-python

    - name: Build, check and install
      run: |
        export PATH="/usr/local/opt/bison/bin:$PATH"
        CONFIG_OPTS="--enable-libveriuser"
        if [ "${{ matrix.libvvp }}" = "true" ]; then
            CONFIG_OPTS="$CONFIG_OPTS --enable-libvvp"
        fi
        if [ "${{ matrix.suffix }}" = "true" ]; then
            CONFIG_OPTS="$CONFIG_OPTS --enable-suffix"
        fi
        autoconf
        ./configure $CONFIG_OPTS
        make -j$(nproc) check
        sudo make install

    - name: Test
      run: |
        . .venv/bin/activate
        make check-installed


  lin:
    services:
        kafka:
          image: apache/kafka:4.3.0
          ports:
            - 9092:9092
          env:
            KAFKA_CFG_NODE_ID: 0
            KAFKA_CFG_PROCESS_ROLES: controller,broker
            KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
            KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
            KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
            KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
            KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
            KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    strategy:
      fail-fast: false
      matrix:
        os: ['22.04', '24.04']
        # libvvp: [false, true]
        # suffix: [false, true]
    runs-on: ubuntu-${{ matrix.os }}
    name: 🐧 Ubuntu ${{ matrix.os }}${{ matrix.libvvp && ' +libvvp' || '' }}${{ matrix.suffix && ' +suffix' || '' }}
    steps:

    - uses: actions/checkout@v6

    - name: Install dependencies
      run: |
        sudo apt update -qq
        sudo apt install -y make g++ git bison flex gperf libreadline-dev libbz2-dev autoconf python3-venv default-jre librdkafka-dev
        python3 -m venv .venv
        . .venv/bin/activate
        pip install --upgrade pip
        pip install -r Documentation/requirements.txt
        pip install kafka-python
    - name: Create Kafka topic
      run: |
        curl -fL -o kafka.tgz "https://dlcdn.apache.org/kafka/4.3.0/kafka_2.13-4.3.0.tgz"
        tar -xzf kafka.tgz
        timeout 60 bash -c 'until kafka_2.13-4.3.0/bin/kafka-topics.sh --list --bootstrap-server localhost:9092 2>/dev/null; do sleep 2; done'
        kafka_2.13-4.3.0/bin/kafka-topics.sh --create \
          --topic iv_data_stream \
          --bootstrap-server localhost:9092 \
          --partitions 1 \
          --replication-factor 1
    - name: Build, check and install
      run: |
        CONFIG_OPTS="--enable-libveriuser"
        if [ "${{ matrix.libvvp }}" = "true" ]; then
            CONFIG_OPTS="$CONFIG_OPTS --enable-libvvp"
        fi
        if [ "${{ matrix.suffix }}" = "true" ]; then
            CONFIG_OPTS="$CONFIG_OPTS --enable-suffix"
        fi
        autoconf
        ./configure $CONFIG_OPTS
        make -j$(nproc) check
        sudo make install

    - name: Test
      run:
        . .venv/bin/activate
        make check-installed

    - name: Documentation
      run: |
        . .venv/bin/activate
        cd Documentation
        make html

  win:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        msystem: [MINGW64, UCRT64, CLANG64]
        # libvvp: [false, true]
        # suffix: [false, true]
        include:
          - { msystem: MINGW64, env: x86_64 }
          - { msystem: UCRT64,  env: ucrt-x86_64 }
          - { msystem: CLANG64, env: clang-x86_64 }
    name: 🟪 ${{ matrix.msystem }}${{ matrix.libvvp && ' +libvvp' || '' }}${{ matrix.suffix && ' +suffix' || '' }}
    defaults:
      run:
        shell: msys2 {0}
    env:
      MINGW_ARCH: ${{ matrix.msystem }}
    steps:

    - run: git config --global core.autocrlf input
      shell: bash

    - uses: actions/checkout@v6

    - uses: msys2/setup-msys2@v2
      with:
        msystem: ${{ matrix.msystem }}
        update: true
        install: >
          git
          base-devel
          python-pip
          mingw-w64-${{ matrix.env }}-perl
          mingw-w64-${{ matrix.env }}-librdkafka

    - uses: actions/setup-python@v6
      with:
        python-version: '>=3.5'
        
    - name: Set up Python environment
      run: |
        python -m venv .venv
        . .venv/bin/activate
        pip install --upgrade pip
        pip install kafka-python

    - name: Start Kafka
      shell: pwsh
      run: |
        Invoke-WebRequest -Uri "https://dlcdn.apache.org/kafka/4.3.0/kafka_2.13-4.3.0.tgz" -OutFile "kafka.tgz"
        tar -xzf "kafka.tgz"
        Move-Item kafka_2.13-4.3.0 C:\kafka

        $uuid = cmd /c "C:\kafka\bin\windows\kafka-storage.bat random-uuid" 2>$null | Select-Object -Last 1
        $uuid = $uuid.Trim()
        Write-Host "UUID: $uuid"

        cmd /c "C:\kafka\bin\windows\kafka-storage.bat format -t $uuid -c C:\kafka\config\kraft\server.properties"

        Start-Process -NoNewWindow cmd -ArgumentList "/c C:\kafka\bin\windows\kafka-server-start.bat C:\kafka\config\kraft\server.properties"

        $deadline = (Get-Date).AddSeconds(60)
        while ((Get-Date) -lt $deadline) {
          $result = cmd /c "C:\kafka\bin\windows\kafka-topics.bat --list --bootstrap-server localhost:9092" 2>$null
          if ($LASTEXITCODE -eq 0) { break }
          Start-Sleep -Seconds 3
        }

        cmd /c "C:\kafka\bin\windows\kafka-topics.bat --create --topic iv_data_stream --bootstrap-server localhost:9092 --partitions 1 --replication-factor 1"

    - name: Build and check
      run: |
        cd msys2
        CONFIG_OPTS=""
        if [ ${{ matrix.msystem }} != "CLANG64" ] ; then
            CONFIG_OPTS="$CONFIG_OPTS --enable-libveriuser"
        fi
        if [ "${{ matrix.libvvp }}" = "true" ] ; then
            CONFIG_OPTS="$CONFIG_OPTS --enable-libvvp"
        fi
        if [ "${{ matrix.suffix }}" = "true" ]; then
            CONFIG_OPTS="$CONFIG_OPTS --enable-suffix"
        fi
        export IVL_CONFIG_OPTIONS="$CONFIG_OPTS"
        makepkg-mingw --noconfirm --noprogressbar -sCLf

    - name: Install
      run: pacman -U --noconfirm msys2/*.zst

    - name: Test
      run: |
        . .venv/bin/activate
        make check-installed

    - uses: actions/upload-artifact@v7
      with:
        name: 🟪 ${{ matrix.msystem }}${{ matrix.libvvp && ' +libvvp' || '' }}
        path: msys2/*.zst
