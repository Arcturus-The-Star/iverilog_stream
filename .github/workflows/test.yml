name: test

on:
  # Every push onto the main branch triggers a retest.
  push:
    branches:
      - master
      - testing
  # All pull_requests trigger a retest.
  pull_request:
  workflow_dispatch:

jobs:

  mac:
    strategy:
      fail-fast: false
      matrix:
        libvvp: [true]
        suffix: [true]
    runs-on: macos-15-intel
    name: 🍏 macOS${{ matrix.libvvp && ' +libvvp' || '' }}${{ matrix.suffix && ' +suffix' || '' }}
    steps:

    - uses: actions/checkout@v6

    - name: Install dependencies
      run: |
        brew install bison
        brew install librdkafka
        brew install coreutils
    - name: Start Kafka
      run: |
        brew install kafka
        BREW_PREFIX=$(brew --prefix)
        rm -rf $BREW_PREFIX/var/lib/kraft-combined-logs
        KAFKA_CLUSTER_ID=$(kafka-storage random-uuid)
        kafka-storage format --standalone -t $KAFKA_CLUSTER_ID \
          -c $BREW_PREFIX/etc/kafka/server.properties
        kafka-server-start $BREW_PREFIX/etc/kafka/server.properties &
        gtimeout 60 bash -c 'until kafka-topics --list --bootstrap-server localhost:9092 2>/dev/null; do sleep 3; done'
        kafka-topics --create \
          --topic iv_data_stream \
          --bootstrap-server localhost:9092 \
          --partitions 1 \
          --replication-factor 1

    - name: Build, check and install
      run: |
        export PATH="/usr/local/opt/bison/bin:$PATH"
        CONFIG_OPTS="--enable-libveriuser"
        if [ "${{ matrix.libvvp }}" = "true" ]; then
            CONFIG_OPTS="$CONFIG_OPTS --enable-libvvp"
        fi
        if [ "${{ matrix.suffix }}" = "true" ]; then
            CONFIG_OPTS="$CONFIG_OPTS --enable-suffix"
        fi
        autoconf
        ./configure $CONFIG_OPTS
        make -j$(nproc) check
        sudo make install

    - name: Test
      run: |
        make check-installed


  lin:
    services:
      kafka:
        image: apache/kafka:4.3.0
        ports:
          - 9092:9092
        env:
          CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
          KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    strategy:
      fail-fast: false
      matrix:
        os: ['22.04', '24.04']
        # libvvp: [false, true]
        # suffix: [false, true]
    runs-on: ubuntu-${{ matrix.os }}
    name: 🐧 Ubuntu ${{ matrix.os }}${{ matrix.libvvp && ' +libvvp' || '' }}${{ matrix.suffix && ' +suffix' || '' }}
    steps:

    - uses: actions/checkout@v6

    - name: Install dependencies
      run: |
        sudo apt update -qq
        sudo apt install -y make g++ git bison flex gperf libreadline-dev libbz2-dev autoconf python3-venv librdkafka-dev openjdk-21-jre-headless
        sudo update-alternatives --set java /usr/lib/jvm/java-21-openjdk-amd64/bin/java
        echo "JAVA_HOME=/usr/lib/jvm/java-21-openjdk-amd64" >> $GITHUB_ENV
        echo "/usr/lib/jvm/java-21-openjdk-amd64/bin" >> $GITHUB_PATH
        python3 -m venv .venv
        . .venv/bin/activate
        pip install --upgrade pip
        pip install -r Documentation/requirements.txt
    - name: Create Kafka topic
      run: |
        java -version
        echo "Downloading Kafka..."
        curl -fL --max-time 120 -o kafka.tgz "https://dlcdn.apache.org/kafka/4.3.0/kafka_2.13-4.3.0.tgz"
        echo "Extracting..."
        tar -xzf kafka.tgz
        echo "Waiting for broker..."
        timeout 120 bash -c 'until kafka_2.13-4.3.0/bin/kafka-topics.sh --list --bootstrap-server localhost:9092 2>/dev/null; do sleep 3; done'
        echo "Creating topic..."
        kafka_2.13-4.3.0/bin/kafka-topics.sh --create \
          --topic iv_data_stream \
          --bootstrap-server localhost:9092 \
          --partitions 1 \
          --replication-factor 1
    - name: Build, check and install
      run: |
        CONFIG_OPTS="--enable-libveriuser"
        if [ "${{ matrix.libvvp }}" = "true" ]; then
            CONFIG_OPTS="$CONFIG_OPTS --enable-libvvp"
        fi
        if [ "${{ matrix.suffix }}" = "true" ]; then
            CONFIG_OPTS="$CONFIG_OPTS --enable-suffix"
        fi
        autoconf
        ./configure $CONFIG_OPTS
        make -j$(nproc) check
        sudo make install

    - name: Test
      run: |
        make check-installed

    - name: Documentation
      run: |
        . .venv/bin/activate
        cd Documentation
        make html

  win:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        msystem: [MINGW64, UCRT64, CLANG64]
        # libvvp: [false, true]
        # suffix: [false, true]
        include:
          - { msystem: MINGW64, env: x86_64 }
          - { msystem: UCRT64,  env: ucrt-x86_64 }
          - { msystem: CLANG64, env: clang-x86_64 }
    name: 🟪 ${{ matrix.msystem }}${{ matrix.libvvp && ' +libvvp' || '' }}${{ matrix.suffix && ' +suffix' || '' }}
    defaults:
      run:
        shell: msys2 {0}
    env:
      MINGW_ARCH: ${{ matrix.msystem }}
    steps:

    - run: git config --global core.autocrlf input
      shell: bash

    - uses: actions/checkout@v6

    - uses: msys2/setup-msys2@v2
      with:
        msystem: ${{ matrix.msystem }}
        update: true
        install: >
          git
          base-devel
          python-pip
          mingw-w64-${{ matrix.env }}-perl
          mingw-w64-${{ matrix.env }}-librdkafka

    # - uses: actions/setup-python@v6
    #   with:
    #     python-version: '>=3.5'

    - name: Start Kafka
      shell: pwsh
      run: |
        java -version
        Invoke-WebRequest -Uri "https://dlcdn.apache.org/kafka/4.3.0/kafka_2.13-4.3.0.tgz" -OutFile "kafka.tgz"
        tar -xzf "kafka.tgz"
        Move-Item kafka_2.13-4.3.0 C:\kafka

        $cfg = "C:\kafka\config\kraft\server.properties"
        if (-not (Test-Path $cfg)) {
          $cfg = Get-ChildItem C:\kafka\config -Recurse -Filter "server.properties" |
                 Select-Object -First 1 -ExpandProperty FullName
        }

        # Force IPv4 binding
        (Get-Content $cfg) `
          -replace 'listeners=.*', 'listeners=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093' `
          -replace 'advertised.listeners=.*', 'advertised.listeners=PLAINTEXT://127.0.0.1:9092' |
          Set-Content $cfg

        $uuid = cmd /c "C:\kafka\bin\windows\kafka-storage.bat random-uuid" 2>$null |
                Select-Object -Last 1
        $uuid = $uuid.Trim()
        
        Get-Content $cfg

        cmd /c "C:\kafka\bin\windows\kafka-storage.bat format --standalone -t $uuid -c `"$cfg`""

        $proc = Start-Process `
          -PassThru `
          -FilePath "cmd.exe" `
          -ArgumentList "/c C:\kafka\bin\windows\kafka-server-start.bat `"$cfg`""

        $deadline = (Get-Date).AddSeconds(120)
        while ((Get-Date) -lt $deadline) {
          $result = cmd /c "C:\kafka\bin\windows\kafka-topics.bat --list --bootstrap-server 127.0.0.1:9092" 2>$null
          Test-NetConnection 127.0.0.1 -Port 9092
          if ($LASTEXITCODE -eq 0) { break }
          if ($proc.HasExited) {
            Write-Host "Kafka exited with code $($proc.ExitCode)"
            exit 1
          }
          Start-Sleep -Seconds 3
        }

        cmd /c "C:\kafka\bin\windows\kafka-topics.bat --create --topic iv_data_stream --bootstrap-server 127.0.0.1:9092 --partitions 1 --replication-factor 1"

    - name: Build and check
      run: |
        cd msys2
        CONFIG_OPTS=""
        if [ ${{ matrix.msystem }} != "CLANG64" ] ; then
            CONFIG_OPTS="$CONFIG_OPTS --enable-libveriuser"
        fi
        if [ "${{ matrix.libvvp }}" = "true" ] ; then
            CONFIG_OPTS="$CONFIG_OPTS --enable-libvvp"
        fi
        if [ "${{ matrix.suffix }}" = "true" ]; then
            CONFIG_OPTS="$CONFIG_OPTS --enable-suffix"
        fi
        export IVL_CONFIG_OPTIONS="$CONFIG_OPTS"
        makepkg-mingw --noconfirm --noprogressbar -sCLf

    - name: Install
      run: pacman -U --noconfirm msys2/*.zst

    - name: Test
      env:
        KAFKA_BOOTSTRAP_SERVERS: 127.0.0.1:9092
      run: |
        netstat -ano | findstr 9092
        make check-installed

    - uses: actions/upload-artifact@v7
      with:
        name: 🟪 ${{ matrix.msystem }}${{ matrix.libvvp && ' +libvvp' || '' }}
        path: msys2/*.zst
